<head>
    <meta charset="UTF-8">

    <!-- Menggunakan Tailwind CSS untuk utilitas layouting -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Menggunakan font Inter untuk tampilan bersih dan modern -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #e8e8e4;
            --text-color: #121212;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }

        /* Menyembunyikan kursor default di desktop untuk custom cursor */
        @media (min-width: 768px) {
            body {
                cursor: none;
            }
            a {
                cursor: none;
            }
        }
        
        /* Styling untuk Kursor Kustom */
        #custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 10px;
            height: 10px;
            background-color: var(--text-color);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s cubic-bezier(0.16, 1, 0.3, 1), 
                        height 0.2s cubic-bezier(0.16, 1, 0.3, 1), 
                        background-color 0.2s ease;
        }
        
        /* State kursor saat hover pada link */
        .cursor-hover {
            width: 40px !important;
            height: 40px !important;
            background-color: var(--text-color);
            mix-blend-mode: difference;
            opacity: 0.8;
        }
        
        /* Animasi pergerakan teks ke kanan saat di hover */
        .menu-item-text {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), color 0.3s;
        }
        
        .menu-item:hover .menu-item-text {
            transform: translateX(3vw);
        }

        /* Animasi Loading Elegan (Progress Line) */
        @keyframes loaderBar {
            0% { transform: scaleX(0); transform-origin: left; }
            50% { transform: scaleX(1); transform-origin: left; }
            51% { transform: scaleX(1); transform-origin: right; }
            100% { transform: scaleX(0); transform-origin: right; }
        }
        .animate-loader-bar {
            animation: loaderBar 1.5s cubic-bezier(0.65, 0, 0.35, 1) infinite;
        }

        /* Styling Scroller Core Values */
        .scroller-container {
            height: 20px;
            overflow: hidden;
            position: relative;
            min-width: 95px;
            text-align: left;
        }
        .scroller-content {
            display: flex;
            flex-direction: column;
            transition: transform 0.5s cubic-bezier(0.65, 0, 0.35, 1);
        }
        .scroller-item {
            height: 20px;
            line-height: 20px;
            white-space: nowrap;
        }
    </style>
</head>

    <!-- Logika Interaksi Kursor -->
    <script>
        const cursor = document.getElementById('custom-cursor');
        const links = document.querySelectorAll('a');
        
        // Lacak posisi asli mouse dan langsung terapkan ke kursor (tanpa delay)
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Tambahkan efek membesar saat kursor berada di atas menu link
        links.forEach(link => {
            link.addEventListener('mouseenter', () => {
                cursor.classList.add('cursor-hover');
            });
            link.addEventListener('mouseleave', () => {
                cursor.classList.remove('cursor-hover');
            });

            // Logika Klik Transisi Layar Hitam
            link.addEventListener('click', (e) => {
                e.preventDefault(); // Mencegah browser pindah tab secara instan
                const href = link.getAttribute('href');
                const projectName = link.querySelector('.menu-item-text').innerText;
                
                const overlay = document.getElementById('transition-overlay');
                const title = document.getElementById('transition-title');
                const loading = document.getElementById('transition-loading');

                // Siapkan kumpulan karakter untuk efek acak
                const randomChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
                
                // Set teks sementara (acak) sebelum animasi dimulai
                title.innerText = projectName.split("").map(() => randomChars[Math.floor(Math.random() * randomChars.length)]).join("");

                // Tampilkan Overlay Hitam
                overlay.classList.remove('opacity-0', 'pointer-events-none');
                overlay.classList.add('opacity-100', 'pointer-events-auto');

                // Jalankan animasi teks: Dari blur/gelap ke jelas/terang
                setTimeout(() => {
                    title.classList.remove('blur-xl', 'opacity-0', 'translate-y-10');
                    title.classList.add('blur-0', 'opacity-100', 'translate-y-0');
                    loading.classList.remove('opacity-0');
                    loading.classList.add('opacity-100');
                    
                    // Efek Teks Acak (Scramble / Decode Effect)
                    let iteration = 0;
                    clearInterval(title.scrambleInterval);
                    
                    title.scrambleInterval = setInterval(() => {
                        title.innerText = projectName
                            .split("")
                            .map((letter, index) => {
                                if (index < iteration) {
                                    return projectName[index];
                                }
                                return randomChars[Math.floor(Math.random() * randomChars.length)];
                            })
                            .join("");
                        
                        if (iteration >= projectName.length) {
                            clearInterval(title.scrambleInterval);
                        }
                        
                        // Kecepatan memecahkan sandi (diperkecil agar lebih lambat)
                        iteration += 1 / 8; 
                    }, 50);

                }, 100);

                // Eksekusi buka tab baru dan reset interface ke awal
                setTimeout(() => {
                    window.open(href, '_blank');
                    
                    // Kembalikan layar seperti semula secara mulus (fade out overlay)
                    setTimeout(() => {
                        overlay.classList.remove('opacity-100', 'pointer-events-auto');
                        overlay.classList.add('opacity-0', 'pointer-events-none');
                        
                        // Reset utility class animasi agar bisa dijalankan lagi pada link berikutnya
                        title.classList.add('blur-xl', 'opacity-0', 'translate-y-10');
                        title.classList.remove('blur-0', 'opacity-100', 'translate-y-0');
                        loading.classList.add('opacity-0');
                        loading.classList.remove('opacity-100');
                    }, 500); 
                }, 1800); // Durasi delay (1.8 detik) sebelum tab terbuka
            });
        });

        // Logika Animasi Scroll Bergulir pada Core Values
        const scrollerContent = document.getElementById('core-values-scroller');
        const totalItems = 7; // Mengikuti jumlah Core Values
        let scrollerIndex = 0;

        setInterval(() => {
            scrollerIndex = (scrollerIndex + 1) % totalItems;
            // Geser posisi Y sebesar 20px ke atas sesuai tinggi teks
            scrollerContent.style.transform = `translateY(-${scrollerIndex * 20}px)`;
        }, 2000); // Ganti teks secara otomatis setiap 2 detik

    </script>
